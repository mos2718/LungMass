<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>FHIR Patient Upload Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, select, button {
      margin-top: 5px;
      padding: 6px;
      width: 250px;
    }
    button {
      margin-top: 15px;
      cursor: pointer;
    }
    pre {
      background: #f4f4f4;
      padding: 15px;
      margin-top: 20px;
      max-width: 800px;
      overflow: auto;
    }
  </style>
</head>
<body>

  <h2>FHIR Patient 上傳測試（HAPI R4）</h2>

  <label>
    姓名（Name）
    <input type="text" id="name" placeholder="例如：Wang Xiao-Ming" />
  </label>

  <label>
    性別（Gender）
    <select id="gender">
      <option value="">-- 請選擇 --</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
      <option value="unknown">Unknown</option>
    </select>
  </label>

  <label>
    生日（Birth Date）
    <input type="date" id="birthDate" />
  </label>

  <button onclick="uploadPatient()">上傳 FHIR Patient</button>

  <h3>FHIR Server 回應結果</h3>
  <pre id="result">(尚未送出)</pre>

  <script>
    async function uploadPatient() {
      const name = document.getElementById("name").value;
      const gender = document.getElementById("gender").value;
      const birthDate = document.getElementById("birthDate").value;

      if (!name || !gender || !birthDate) {
        alert("請完整輸入姓名、性別與生日");
        return;
      }

      // 建立 FHIR Patient resource
      const patientResource = {
        resourceType: "Patient",
        name: [
          {
            text: name
          }
        ],
        gender: gender,
        birthDate: birthDate
      };

      try {
        const response = await fetch(
         "https://tzuchi-fhir.ddns.net/fhir/Patient",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/fhir+json"
            },
            body: JSON.stringify(patientResource)
          }
        );

        const responseData = await response.json();

        document.getElementById("result").textContent =
          JSON.stringify(responseData, null, 2);

      } catch (error) {
        document.getElementById("result").textContent =
          "發生錯誤：\n" + error;
      }
    }
  </script>

</body>
</html>
